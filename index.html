<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건실 학생 접수 및 실시간 모니터링 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter & Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- QRious QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .active-scale {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .active-scale:active {
            transform: scale(0.96);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ping-badge {
            position: relative;
        }
        .ping-badge::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: ping 1.2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Header Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-2.5 cursor-pointer" onclick="goHome()">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-teal-100">
                    <i class="fa-solid fa-house-medical text-xl animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-black text-slate-800 tracking-tight flex items-center gap-1.5">
                        광주자연과학고 보건실 스마트 접수
                    </h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-medium">Smart Clinic Kiosk System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- Clock -->
                <div id="realtime-clock" class="hidden md:flex items-center gap-1.5 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-500">
                    <i class="fa-regular fa-clock text-teal-600"></i>
                    <span id="clock-text">--:--:--</span>
                </div>
                
                <!-- System Status / Mode Switch -->
                <button id="btn-mode-toggle" onclick="promptModeChange()" class="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-xl text-xs md:text-sm font-extrabold active-scale shadow-md shadow-slate-900/10 transition-all">
                    <i class="fa-solid fa-lock-open text-[11px]"></i>
                    <span id="mode-toggle-text">선생님 화면 전환</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Content Frame -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
        <!-- DB Mode Badge Notification -->
        <div id="db-indicator" class="mb-4 text-center">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-extrabold bg-blue-50 text-blue-700 border border-blue-200">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span>
                실시간 데이터베이스 연동 활성화 (Simulation Mode)
            </span>
        </div>

        <div id="app-card" class="bg-white border border-slate-100 shadow-xl rounded-3xl p-6 md:p-8 flex flex-col min-h-[550px] relative transition-all duration-300">
            <!-- Dynamic Content Renders Here -->
            <div id="dynamic-content" class="flex-grow flex flex-col justify-between h-full"></div>
            
            <!-- Step Navigation Controls (For Kiosk Mode) -->
            <div id="kiosk-controls" class="border-t border-slate-100 pt-6 mt-6 flex justify-between items-center hidden">
                <button id="btn-prev" onclick="prevStep()" class="px-5 py-3 border-2 border-slate-200 hover:bg-slate-50 text-slate-500 font-bold rounded-2xl active-scale transition-colors text-sm md:text-base flex items-center gap-2">
                    <i class="fa-solid fa-chevron-left"></i> 이전
                </button>
                <div id="step-indicator" class="flex gap-1.5 justify-center items-center">
                    <!-- Dots generated programmatically -->
                </div>
                <button id="btn-next" onclick="nextStep()" class="px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white font-black rounded-2xl active-scale shadow-lg shadow-teal-600/10 transition-colors text-sm md:text-base flex items-center gap-2">
                    다음 <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Custom Custom Modal / Dialog UI -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 transform scale-95 opacity-0 transition-all duration-200" id="modal-container">
            <div class="text-center">
                <div id="modal-icon" class="w-14 h-14 mx-auto bg-amber-50 rounded-full flex items-center justify-center text-amber-500 text-2xl mb-4">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 id="modal-title" class="text-lg font-extrabold text-slate-800 mb-2">알림</h3>
                <p id="modal-desc" class="text-sm text-slate-500 leading-relaxed mb-6">내용입니다.</p>
                <div id="modal-actions" class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl active-scale transition-all">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Prompt Modal -->
    <div id="password-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 transform scale-95 opacity-0 transition-all duration-200" id="password-container">
            <div class="text-center">
                <div class="w-14 h-14 mx-auto bg-teal-50 rounded-full flex items-center justify-center text-teal-600 text-2xl mb-4">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h3 class="text-lg font-extrabold text-slate-800 mb-2">교사인증 비밀번호</h3>
                <p class="text-xs text-slate-400 mb-4">보건교사 전용 대시보드 진입을 위한 암호를 입력하세요.</p>
                <input type="password" id="input-password" class="w-full text-center text-2xl font-black tracking-[0.5em] p-3 border-2 border-slate-200 rounded-xl outline-none focus:border-teal-500 mb-5" placeholder="••••" maxlength="11">
                <div class="flex gap-2">
                    <button onclick="closePasswordModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl active-scale">취소</button>
                    <button onclick="submitPassword()" class="flex-1 py-3 bg-teal-600 hover:bg-teal-700 text-white font-extrabold rounded-xl active-scale">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-100 border-t border-slate-200 py-4 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-xs text-slate-400 font-medium">
            &copy; 광주자연과학고등학교 보건실 스마트 클리닉 모니터링 서비스.
        </div>
    </footer>

    <!-- Firebase Imports Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Application State ---
        const state = {
            currentMode: 'kiosk', // 'kiosk' or 'teacher'
            currentStep: 0,
            studentInfo: {
                grade: '',
                classNum: '',
                number: '',
                name: '',
                phone: ''
            },
            symptoms: [],
            painLevel: 3, 
            hasFever: null, 
            details: '',
            receptions: [], // Real-time reception queue
            filterStatus: 'all', // 'all', 'waiting', 'treating', 'completed'
            selectedDate: new Date().toISOString().split('T')[0],
            lastReceptionCount: 0, // To track new additions and trigger audio alert
            teacherStatus: { isAway: false, message: '' } // 선생님 부재중 상태 및 알림메시지 관리
        };

        const totalSteps = 6;
        const symptomsData = [
            { id: 'head', label: '머리가 아파요 (두통)', emoji: '🤕', desc: '어지러움, 머리 지끈거림' },
            { id: 'stomach', label: '배가 아파요 (복통)', emoji: '🤢', desc: '소화불량, 쓰라림, 울렁거림' },
            { id: 'throat', label: '목이 따가워요 (인후통)', emoji: '🗣️', desc: '침 넘기기 힘듬, 감기 증세' },
            { id: 'cough', label: '기침/감기 기운', emoji: '🤧', desc: '콧물, 재채기, 오한, 미열' },
            { id: 'wound', label: '상처가 났어요 (피남)', emoji: '🩸', desc: '찰과상, 베인 상처, 긁힘' },
            { id: 'sprain', label: '삐었어요 (타박상)', emoji: '🩹', desc: '접지름, 부어오름, 멍' },
            { id: 'tooth', label: '이가 아파요 (치통)', emoji: '🦷', desc: '치아 통증, 잇몸 부음' },
            { id: 'eye', label: '눈이 불편해요', emoji: '👁️', desc: '가려움, 충혈, 안구 통증' },
            { id: 'etc', label: '그 외 기타 아픔', emoji: '❓', desc: '기타 불편 사항 기록' }
        ];

        // --- STREAMING_CHUNK: Setting up customized Database configurations... ---
        
        // ==========================================
        // [필독] 학교 전용 실시간 데이터베이스 연동 설정
        // ==========================================
        // 깃허브에 올리기 전 본인의 Firebase Config 정보가 있다면 아래에 채워 넣으세요.
        // 비어있을 경우 브라우저 로컬 저장(시뮬레이션 모드)으로 기본 작동합니다.
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyB5Ivn5I4Tb8qYnCIZnNuEyPPoFDHhim14",
            authDomain: "my-school-clinic.firebaseapp.com",
            projectId: "my-school-clinic",
            storageBucket: "my-school-clinic.firebasestorage.app",
            messagingSenderId: "984642063288",
            appId: "1:984642063288:web:02f60102c96c535f661d4"
        };

        let db = null;
        let auth = null;
        let isSimulation = true;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-clinic-default';

        // Initialize Firebase and Firestore real-time sync
        async function setupFirebase() {
            try {
                let activeConfig = null;

                // 1. 직접 작성한 FIREBASE_CONFIG가 유효한지 확인
                if (FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE") {
                    activeConfig = FIREBASE_CONFIG;
                } else {
                    // 2. 관리자 설정 대시보드 저장 데이터가 있는지 로컬스토리지 확인
                    const savedConfig = localStorage.getItem('user_firebase_config');
                    if (savedConfig) {
                        activeConfig = JSON.parse(savedConfig);
                    }
                }

                if (activeConfig) {
                    const app = initializeApp(activeConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    
                    isSimulation = false;
                    document.getElementById('db-indicator').innerHTML = `
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-extrabold bg-emerald-50 text-emerald-700 border border-emerald-200 animate-pulse">
                            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                            실시간 클라우드 DB 연동 완료 (정상 작동 중)
                        </span>
                    `;
                    
                    subscribeToRealtimeData();
                } else {
                    console.log("No Firebase config provided. Running in Local Simulation Mode.");
                    runSimulationMode();
                }
            } catch (err) {
                console.error("Firebase connection error. Falling back to Simulation.", err);
                runSimulationMode();
            }
        }

        // --- STREAMING_CHUNK: Initializing simulated state logic... ---
        function runSimulationMode() {
            isSimulation = true;
            document.getElementById('db-indicator').innerHTML = `
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-extrabold bg-amber-50 text-amber-700 border border-amber-200">
                    <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                    시뮬레이션 모드로 작동 중 (로컬 메모리 임시 저장)
                </span>
            `;
            
            // LocalStorage를 활용한 모의 데이터 연동 보존
            const localData = localStorage.getItem('simulated_receptions');
            if (localData) {
                state.receptions = JSON.parse(localData);
            } else {
                state.receptions = [
                    { id: 'mock-1', grade: '3', classNum: '2', number: '15', name: '김지우', phone: '010-1111-2222', symptoms: ['head', 'cough'], painLevel: 2, hasFever: false, details: '아침부터 기침이 조금 나고 머리가 지끈거립니다.', status: 'waiting', timestamp: Date.now() - 600000 },
                    { id: 'mock-2', grade: '2', classNum: '4', number: '7', name: '이현우', phone: '010-3333-4444', symptoms: ['wound'], painLevel: 4, hasFever: false, details: '체육 시간에 달리다가 넘어져서 무릎에 피가 나고 쓰라립니다.', status: 'treating', timestamp: Date.now() - 300000 },
                    { id: 'mock-3', grade: '1', classNum: '1', number: '24', name: '박서현', phone: '010-5555-6666', symptoms: ['stomach'], painLevel: 5, hasFever: true, details: '점심 먹고 급체했는지 아랫배가 쥐어짜듯이 너무 아프고 식은땀이 납니다.', status: 'completed', timestamp: Date.now() - 900000 }
                ];
                localStorage.setItem('simulated_receptions', JSON.stringify(state.receptions));
            }
            
            const localAway = localStorage.getItem('simulated_away_status');
            if (localAway) {
                state.teacherStatus = JSON.parse(localAway);
            } else {
                state.teacherStatus = { isAway: false, message: '현재 부재중이십니다. 급한 부상 시 교무실로 연락바랍니다.' };
            }
            
            state.lastReceptionCount = state.receptions.length;
            updateUI();
        }

        // Real-Time Firestore Subscription
        function subscribeToRealtimeData() {
            if (!db || isSimulation) return;
            
            const appIdStr = appId;
            
            // 1. Subscribe to receptions
            const receptionsQuery = collection(db, 'artifacts', appIdStr, 'public', 'data', 'receptions');
            onSnapshot(receptionsQuery, (snapshot) => {
                let list = [];
                snapshot.forEach(doc => {
                    list.push({ id: doc.id, ...doc.data() });
                });
                
                list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                
                const newWaitingCount = list.filter(r => r.status === 'waiting' || !r.status).length;
                const prevWaitingCount = state.receptions.filter(r => r.status === 'waiting' || !r.status).length;
                
                if (newWaitingCount > prevWaitingCount && state.currentMode === 'teacher') {
                    playChime();
                }
                
                state.receptions = list;
                updateUI();
            }, (error) => {
                console.error("Firestore error on Receptions snapshot:", error);
            });

            // 2. Subscribe to teacherStatus config
            const statusDocRef = doc(db, 'artifacts', appIdStr, 'public', 'data', 'status', 'teacherStatus');
            onSnapshot(statusDocRef, (snap) => {
                if (snap.exists()) {
                    state.teacherStatus = snap.data();
                } else {
                    state.teacherStatus = { isAway: false, message: '' };
                }
                updateUI();
            }, (error) => {
                console.error("Firestore error on Status snap:", error);
            });
        }

        // Play Synthesized Chime (Web Audio API)
        function playChime() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(783.99, ctx.currentTime); 
                gain1.gain.setValueAtTime(0.25, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.6);
                
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime); 
                    gain2.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.6);
                }, 250);
            } catch (e) {
                console.warn("Sound chime unavailable:", e);
            }
        }

        // --- STREAMING_CHUNK: Creating layout rendering logic... ---
        function updateUI() {
            const container = document.getElementById('dynamic-content');
            const controlBar = document.getElementById('kiosk-controls');
            const appCard = document.getElementById('app-card');
            
            if (state.currentMode === 'kiosk') {
                controlBar.classList.remove('hidden');
                appCard.className = "bg-white border border-slate-100 shadow-xl rounded-3xl p-6 md:p-8 flex flex-col min-h-[580px] relative transition-all duration-300 max-w-xl mx-auto w-full";
                
                switch(state.currentStep) {
                    case 0: container.innerHTML = renderStep0(); controlBar.classList.add('hidden'); break;
                    case 1: container.innerHTML = renderStep1(); break;
                    case 2: container.innerHTML = renderStep2(); break;
                    case 3: container.innerHTML = renderStep3(); break;
                    case 4: container.innerHTML = renderStep4(); break;
                    case 5: container.innerHTML = renderStep5(); break;
                    case 6: container.innerHTML = renderStep6(); controlBar.classList.add('hidden'); break;
                }
                
                renderStepDots();
                validateStepNavigation();
            } else {
                controlBar.classList.add('hidden');
                appCard.className = "bg-slate-50/50 border border-slate-200 shadow-xl rounded-3xl p-4 md:p-6 flex flex-col min-h-[600px] relative transition-all duration-300 w-full";
                container.innerHTML = renderTeacherDashboard();
                generateQrCode();
            }
        }

        function validateStepNavigation() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            if (!btnPrev || !btnNext) return;

            btnPrev.disabled = state.currentStep <= 1;
            btnPrev.style.opacity = state.currentStep <= 1 ? "0.4" : "1";

            if (state.currentStep === 1) {
                const isValid = state.studentInfo.grade && state.studentInfo.classNum && state.studentInfo.number && state.studentInfo.name.trim().length > 0;
                btnNext.disabled = !isValid;
                btnNext.style.opacity = isValid ? "1" : "0.4";
            } else if (state.currentStep === 2) {
                const hasSymptom = state.symptoms.length > 0;
                btnNext.disabled = !hasSymptom;
                btnNext.style.opacity = hasSymptom ? "1" : "0.4";
            } else if (state.currentStep === 4) {
                const feverSelected = state.hasFever !== null;
                btnNext.disabled = !feverSelected;
                btnNext.style.opacity = feverSelected ? "1" : "0.4";
            } else {
                btnNext.disabled = false;
                btnNext.style.opacity = "1";
            }
        }

        function renderStepDots() {
            const dotsContainer = document.getElementById('step-indicator');
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            
            for (let i = 1; i <= 5; i++) {
                const isActive = state.currentStep === i;
                const isPassed = state.currentStep > i;
                let dotClass = "w-2.5 h-2.5 rounded-full transition-all duration-300 ";
                
                if (isActive) {
                    dotClass += "bg-teal-600 w-6";
                } else if (isPassed) {
                    dotClass += "bg-teal-200";
                } else {
                    dotClass += "bg-slate-200";
                }
                dotsContainer.innerHTML += `<div class="${dotClass}"></div>`;
            }
        }

        // --- STREAMING_CHUNK: Constructing Kiosk multi-step views... ---
        function renderStep0() {
            let awayBanner = '';
            if (state.teacherStatus && state.teacherStatus.isAway) {
                awayBanner = `
                    <div class="bg-amber-50 border-2 border-amber-300 rounded-2xl p-4 text-center max-w-sm mb-6 animate-pulse">
                        <p class="font-extrabold text-amber-950 text-sm flex items-center justify-center gap-1.5 mb-1">

        function renderStep1() {
            const inputClass = "w-full text-center text-2xl md:text-3xl font-bold p-3 border-2 border-slate-300 rounded-xl focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition-all";
            return `
                <div class="fade-in flex flex-col h-full justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">학번과 이름을 입력해주세요</h2>
                        <p class="text-center text-gray-400 text-sm mb-6">정확한 정보 확인을 위해 필요합니다.</p>
                        
                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div class="flex flex-col items-center gap-2">
                                <label class="font-bold text-gray-600">학년</label>

                                </div>
                            </div>

                                <label class="font-bold text-gray-600">번호</label>

                                    <span class="ml-1.5 text-lg font-bold text-gray-500">번</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col items-center gap-2 mb-4 max-w-sm mx-auto w-full">
                            <label class="font-bold text-gray-600">이름</label>

                            <input type="tel" id="input-phone" class="${inputClass} !text-center px-6 !text-xl" value="${state.studentInfo.phone || ''}" oninput="formatPhoneNumber(this); validateStep1();" placeholder="010-1234-5678">
                        </div>
                    </div>
                </div>
            `;
        }

        window.formatPhoneNumber = function(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            let formatted = '';
            if (val.length < 4) {
                formatted = val;
            } else if (val.length < 7) {
                formatted = val.substr(0, 3) + '-' + val.substr(3);
            } else if (val.length < 11) {
                formatted = val.substr(0, 3) + '-' + val.substr(3, 3) + '-' + val.substr(6);
            } else {
                formatted = val.substr(0, 3) + '-' + val.substr(3, 4) + '-' + val.substr(7, 4);
            }
            input.value = formatted.slice(0, 13);
            state.studentInfo.phone = input.value;
        };

                                    <div class="ml-auto">

                                    </div>
                                </div>

                        <div class="flex gap-2.5 mt-3">

        function renderStep6() {
            const info = state.studentInfo;
            const selectedSymptoms = state.symptoms.map(id => symptomsData.find(s => s.id === id)?.label || '').join(', ');
            const painLabel = ['조금 아파요', '약간 아파요', '보통이에요', '많이 아파요', '너무 아파요'][state.painLevel - 1];

                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-sm border border-slate-200">

                        <dl class="space-y-3.5 text-left text-sm md:text-base">

                    <button onclick="resetApp()" class="mt-6 px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl active-scale transition-colors">

        // --- STREAMING_CHUNK: Formatting Teacher Control dashboards... ---
function renderTeacherDashboard() {
    // 1. 선택한 날짜에 맞는 접수건 필터링
    const filteredReceptions = state.receptions.filter(r => {
        const rDate = r.timestamp ? new Date(r.timestamp).toISOString().split('T')[0] : "";
        return rDate === state.selectedDate;
    });

    const waitingList = filteredReceptions.filter(r => r.status === 'waiting' || !r.status);
    const treatingList = filteredReceptions.filter(r => r.status === 'treating');
    const completedList = filteredReceptions.filter(r => r.status === 'completed');
    
    let activeList = filteredReceptions;
    if (state.filterStatus === 'waiting') activeList = waitingList;
    else if (state.filterStatus === 'treating') activeList = treatingList;
    else if (state.filterStatus === 'completed') activeList = completedList;

    let cardsHtml = activeList.map(item => {
        const painLabel = ['조금', '약간', '보통', '많이', '너무'][item.painLevel - 1] || '보통';
        const sLabels = item.symptoms ? item.symptoms.map(id => symptomsData.find(s => s.id === id)?.label || id).join(', ') : '기타';
        
        let statusBadge = '', statusColor = '', actionButton = '';
        if (item.status === 'completed') {
            statusBadge = '<span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full font-bold text-xs">완료</span>';
            statusColor = 'border-l-slate-300';
            actionButton = `<button onclick="deleteReceptionLog('${item.id}')" class="text-slate-400 hover:text-red-500 p-2 text-lg active-scale"><i class="fa-solid fa-trash-can"></i></button>`;
        } else if (item.status === 'treating') {
            statusBadge = '<span class="bg-blue-100 text-blue-600 px-2.5 py-1 rounded-full font-bold text-xs ping-badge">진료 중</span>';
            statusColor = 'border-l-blue-500';
            actionButton = `<button onclick="updateStatus('${item.id}', 'completed')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold active-scale">완료 처리</button>`;
        } else {
            statusBadge = '<span class="bg-amber-100 text-amber-600 px-2.5 py-1 rounded-full font-bold text-xs">대기 중</span>';
            statusColor = 'border-l-amber-500';
            actionButton = `<button onclick="updateStatus('${item.id}', 'treating')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold active-scale">진료 시작</button>`;
        }

        return `
            <div class="bg-white border-l-8 ${statusColor} rounded-xl shadow-sm p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 hover:shadow-md transition-all">
                <div class="flex-grow space-y-1">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="font-extrabold text-slate-800 text-lg">${item.grade}학년 ${item.classNum}반 ${item.number}번 ${item.name}</span>
                        ${statusBadge}
                    </div>
                    <div class="text-sm text-slate-600 font-medium">
                        <span class="text-teal-600 font-bold">[증상]</span> ${sLabels} | 
                        <span class="text-amber-500 font-bold">[통증]</span> ${painLabel} (Lv.${item.painLevel})
                    </div>
                </div>
                <div class="flex items-center gap-2">${actionButton}</div>
            </div>
        `;
    }).join('');

    return `
        <div class="fade-in space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <label class="font-extrabold text-slate-700">조회 날짜:</label>
                    <input type="date" value="${state.selectedDate}" onchange="state.selectedDate=this.value; updateUI()" class="border-2 border-slate-200 rounded-lg p-2 font-bold text-teal-700 outline-none focus:border-teal-500 cursor-pointer">
                </div>
                <button onclick="downloadReceptionList()" class="text-xs font-bold bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg text-slate-600"><i class="fa-solid fa-file-excel mr-1"></i> 엑셀</button>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div onclick="setFilter('all')" class="bg-white p-4 rounded-2xl border-2 ${state.filterStatus === 'all' ? 'border-slate-800 bg-slate-50' : 'border-slate-150'} cursor-pointer active-scale shadow-sm">
                    <p class="text-xs font-bold text-slate-400">전체</p><p class="text-xl font-black">${filteredReceptions.length}명</p>
                </div>
                <div onclick="setFilter('waiting')" class="bg-white p-4 rounded-2xl border-2 ${state.filterStatus === 'waiting' ? 'border-amber-500 bg-amber-50' : 'border-slate-150'} cursor-pointer active-scale shadow-sm">
                    <p class="text-xs font-bold text-amber-500">대기중</p><p class="text-xl font-black">${waitingList.length}명</p>
                </div>
                <div onclick="setFilter('treating')" class="bg-white p-4 rounded-2xl border-2 ${state.filterStatus === 'treating' ? 'border-blue-500 bg-blue-50' : 'border-slate-150'} cursor-pointer active-scale shadow-sm">
                    <p class="text-xs font-bold text-blue-500">진료중</p><p class="text-xl font-black">${treatingList.length}명</p>
                </div>
                <div onclick="setFilter('completed')" class="bg-white p-4 rounded-2xl border-2 ${state.filterStatus === 'completed' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-150'} cursor-pointer active-scale shadow-sm">
                    <p class="text-xs font-bold text-emerald-500">완료</p><p class="text-xl font-black">${completedList.length}명</p>
                </div>
            </div>

            <div class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                ${cardsHtml || '<div class="text-center py-12 text-slate-400">해당 날짜에 접수된 내역이 없습니다.</div>'}
            </div>

            <!-- QR Code Section -->
            <div class="bg-slate-800 rounded-2xl p-6 text-white flex flex-col md:flex-row items-center gap-6 shadow-xl">
                <div class="bg-white p-2 rounded-xl">
                    <canvas id="qr-code-canvas" class="w-32 h-32"></canvas>
                </div>
                <div class="flex-grow">
                    <h4 class="font-black text-lg mb-1">학생용 모바일 접수 바로가기</h4>
                    <p class="text-xs text-slate-400 mb-4">이 QR 코드를 학생들에게 스캔하게 하거나, 아래 주소를 공유하세요.</p>
                    <div class="flex gap-2">
                        <input type="text" id="share-url" readonly class="w-full bg-slate-700 border-none rounded-lg p-2 text-xs text-slate-300">
                        <button onclick="copyShareUrl()" class="bg-teal-600 hover:bg-teal-500 px-4 py-2 rounded-lg text-sm font-bold active-scale">복사</button>
                    </div>
                </div>
            </div>
        </div>
    `;
}
        // --- STREAMING_CHUNK: Setting up interactive controller methods... ---
        window.startKioskProcess = function() {
            state.currentStep = 1;
            updateUI();
        };

        window.prevStep = function() {
            if (state.currentStep > 1) {
                state.currentStep--;
                updateUI();
            }
        };

        window.nextStep = function() {
            if (state.currentStep === 1) {
                saveStep1Data();
            }
            
            if (state.currentStep < totalSteps) {
                state.currentStep++;
                updateUI();
                
                if (state.currentStep === totalSteps) {
                    submitDataToFirestore();
                }
            }
        };

        window.validateStep1 = function() {
            const g = document.getElementById('input-grade')?.value;
            const c = document.getElementById('input-class')?.value;
            const n = document.getElementById('input-number')?.value;
            const name = document.getElementById('input-name')?.value;
            
            const isValid = g && c && n && name && name.trim().length > 0;
            const btnNext = document.getElementById('btn-next');
            if (btnNext) {
                btnNext.disabled = !isValid;
                btnNext.style.opacity = isValid ? "1" : "0.4";
            }
        };

        function saveStep1Data() {
            state.studentInfo.grade = document.getElementById('input-grade').value;
            state.studentInfo.classNum = document.getElementById('input-class').value;
            state.studentInfo.number = document.getElementById('input-number').value;
            state.studentInfo.name = document.getElementById('input-name').value.trim();
            state.studentInfo.phone = document.getElementById('input-phone').value.trim();
        }

        window.toggleSymptom = function(id) {
            const index = state.symptoms.indexOf(id);
            if (index > -1) {
                state.symptoms.splice(index, 1);
            } else {
                state.symptoms.push(id);
            }
            updateUI();
        };

        window.changePainLevel = function(val) {
            state.painLevel = parseInt(val);
            updateUI();
        };

        window.selectFever = function(val) {
            state.hasFever = val;
            updateUI();
        };

        window.updateDetails = function(val) {
            state.details = val;
        };

        window.insertQuickPhrase = function(phrase) {
            const textarea = document.getElementById('input-details');
            if (!textarea) return;
            const curVal = textarea.value;
            const newVal = curVal ? curVal + '\n' + phrase : phrase;
            textarea.value = newVal;
            state.details = newVal;
        };

        window.resetApp = function() {
            Object.assign(state, {
                currentStep: 0,
                studentInfo: { grade: '', classNum: '', number: '', name: '', phone: '' },
                symptoms: [],
                painLevel: 3,
                hasFever: null,
                details: ''
            });
            updateUI();
        };

        window.goHome = function() {
            if (state.currentMode === 'kiosk') {
                resetApp();
            }
        };

        // Submit to Firestore
        async function submitDataToFirestore() {
// [중복 접수 방지 로직]
const isDuplicate = state.receptions.some(r => 
    (r.status === 'waiting' || r.status === 'treating') &&
    r.grade === state.studentInfo.grade &&
    r.classNum === state.studentInfo.classNum &&
    r.number === state.studentInfo.number &&
    r.name === state.studentInfo.name
);

if (isDuplicate) {
    openCustomModal("접수 제한", "이미 접수된 학생입니다. 선생님의 호출을 기다려주세요.");
    return; // 저장 로직으로 넘어가지 않고 종료합니다.
}
            if (!isSimulation && db) {
                try {
                    const payload = {
                        grade: state.studentInfo.grade,
                        classNum: state.studentInfo.classNum,
                        number: state.studentInfo.number,
                        name: state.studentInfo.name,
                        phone: state.studentInfo.phone,
                        symptoms: state.symptoms,
                        painLevel: state.painLevel,
                        hasFever: state.hasFever,
                        details: state.details,
                        status: 'waiting', 
                        timestamp: Date.now() 
                    };

                    const publicCollection = collection(db, 'artifacts', appId, 'public', 'data', 'receptions');
                    await addDoc(publicCollection, payload);
                } catch (e) {
                    console.error("Firestore saving failed:", e);
                }
            } else {
                // Simulation Mode Write
                const newRecord = {
                    id: 'sim-' + Date.now(),
                    grade: state.studentInfo.grade,
                    classNum: state.studentInfo.classNum,
                    number: state.studentInfo.number,
                    name: state.studentInfo.name,
                    phone: state.studentInfo.phone,
                    symptoms: [...state.symptoms],
                    painLevel: state.painLevel,
                    hasFever: state.hasFever,
                    details: state.details,
                    status: 'waiting',
                    timestamp: Date.now()
                };
                state.receptions.unshift(newRecord);
                localStorage.setItem('simulated_receptions', JSON.stringify(state.receptions));
                updateUI();
            }

            // Return to main menu in 30 seconds
            setTimeout(() => {
                if (state.currentStep === 6 && state.currentMode === 'kiosk') {
                    resetApp();
                }
            }, 30000);
        }

        // --- Teacher Mode Actions ---
        window.promptModeChange = function() {
            if (state.currentMode === 'kiosk') {
                document.getElementById('input-password').value = '';
                const modal = document.getElementById('password-modal');
                const container = document.getElementById('password-container');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    container.classList.remove('scale-95', 'opacity-0');
                }, 50);
            } else {
                state.currentMode = 'kiosk';
                state.currentStep = 0;
                resetApp();
                document.getElementById('mode-toggle-text').innerText = "선생님 화면 전환";
                document.getElementById('btn-mode-toggle').innerHTML = `<i class="fa-solid fa-lock-open text-[11px]"></i> 선생님 화면 전환`;
            }
        };

        window.closePasswordModal = function() {
            const modal = document.getElementById('password-modal');
            const container = document.getElementById('password-container');
            container.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        };

        window.submitPassword = function() {
            const password = document.getElementById('input-password').value;
            if (password === '01030387895') {
                state.currentMode = 'teacher';
                closePasswordModal();
                updateUI();
                document.getElementById('mode-toggle-text').innerText = "학생 모드 전환";
                document.getElementById('btn-mode-toggle').innerHTML = `<i class="fa-solid fa-circle-user text-[11px]"></i> 학생 모드 전환`;
            } else {
                openCustomModal("비밀번호 불일치", "비밀번호가 일치하지 않습니다. 올바른 4자리 암호를 입력해 주세요.");
            }
        };

        window.setFilter = function(filter) {
            state.filterStatus = filter;
            updateUI();
        };

        window.updateStatus = async function(id, newStatus) {
            if (!isSimulation && db) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'receptions', id);
                    await updateDoc(docRef, { status: newStatus });
                } catch (e) {
                    console.error("Failed to update status in Firestore:", e);
                }
            } else {
                const item = state.receptions.find(r => r.id === id);
                if (item) {
                    item.status = newStatus;
                    localStorage.setItem('simulated_receptions', JSON.stringify(state.receptions));
                    updateUI();
                }
            }
        };

        window.deleteReceptionLog = async function(id) {
            if (!isSimulation && db) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'receptions', id);
                    await deleteDoc(docRef);
                } catch (e) {
                    console.error("Failed to delete log from Firestore:", e);
                }
            } else {
                state.receptions = state.receptions.filter(r => r.id !== id);
                localStorage.setItem('simulated_receptions', JSON.stringify(state.receptions));
                updateUI();
            }
        };

        window.toggleTeacherAway = async function(isAway) {
            state.teacherStatus.isAway = isAway;
            if (!isSimulation && db) {
                try {
                    const statusDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'teacherStatus');
                    await setDoc(statusDocRef, { 
                        isAway: isAway, 
                        message: state.teacherStatus.message || '' 
                    }, { merge: true });
                } catch (e) {
                    console.error("Failed to update status in Firestore:", e);
                }
            } else {
                localStorage.setItem('simulated_away_status', JSON.stringify(state.teacherStatus));
                updateUI();
            }
        };

        window.saveTeacherAwayMessage = async function() {
            const inputVal = document.getElementById('away-msg-input')?.value.trim() || '';
            state.teacherStatus.message = inputVal;
            
            if (!isSimulation && db) {
                try {
                    const statusDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'teacherStatus');
                    await setDoc(statusDocRef, { message: inputVal }, { merge: true });
                    openCustomModal("상태 저장 완료", "부재중 정보가 실시간 데이터베이스에 성공적으로 동기화되었습니다.");
                } catch (e) {
                    console.error("Failed to save message in Firestore:", e);
                }
            } else {
                localStorage.setItem('simulated_away_status', JSON.stringify(state.teacherStatus));
                openCustomModal("상태 저장 완료", "시뮬레이션 메모리에 부재중 메시지가 안전하게 반영되었습니다.");
                updateUI();
            }
        };

        // Generate QR code automatically dynamically based on page address
        window.generateQrCode = function() {
            setTimeout(() => {
                const canvas = document.getElementById('qr-code-canvas');
                const urlInput = document.getElementById('share-url');
                if (canvas && urlInput) {
                    const currentUrl = window.location.href;
                    urlInput.value = currentUrl;
                    try {
                        new QRious({
                            element: canvas,
                            value: currentUrl,
                            size: 140,
                            level: 'M',
                            foreground: '#0f172a'
                        });
                    } catch (e) {
                        console.error("QR Code rendering failed:", e);
                    }
                }
            }, 100);
        };

        window.copyShareUrl = function() {
            const copyText = document.getElementById("share-url");
            if (copyText) {
                copyText.select();
                copyText.setSelectionRange(0, 99999);
                document.execCommand("copy");
                openCustomModal("주소 복사 완료", "클립보드에 기기 연동용 주소가 성공적으로 복사되었습니다. 다른 스마트 기기의 브라우저에 주소를 입력해 사용해 보세요.");
            }
        };

        window.openCustomModal = function(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            
            const modal = document.getElementById('custom-modal');
            const container = document.getElementById('modal-container');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('scale-95', 'opacity-0');
            }, 50);
        };

        window.closeModal = function() {
            const modal = document.getElementById('custom-modal');
            const container = document.getElementById('modal-container');
            
            container.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        };

// 학생 명단 엑셀(CSV) 다운로드 함수
window.downloadReceptionList = function() {
    if (state.receptions.length === 0) {
        openCustomModal("알림", "다운로드할 접수 내역이 없습니다.");
        return;
    }

    // HTML 테이블 구조로 데이터를 만듭니다 (엑셀이 가장 좋아하는 형식)
    let tableHtml = `
        <table border="1">
            <thead>
                <tr>
                    <th>학년</th><th>반</th><th>번호</th><th>이름</th><th>연락처</th>
                    <th>증상</th><th>통증지수</th><th>발열여부</th><th>상태</th><th>접수시간</th>
                </tr>
            </thead>
            <tbody>
    `;

    state.receptions.forEach(r => {
        const symptoms = (r.symptoms || []).map(id => symptomsData.find(s => s.id === id)?.label || id).join(', ');
        const statusText = r.status === 'completed' ? '완료' : (r.status === 'treating' ? '진료중' : '대기중');
        
        tableHtml += `
            <tr>
                <td>${r.grade}</td>
                <td>${r.classNum}</td>
                <td>${r.number}</td>
                <td>${r.name}</td>
                <td>${r.phone || ""}</td>
                <td>${symptoms}</td>
                <td>${r.painLevel}</td>
                <td>${r.hasFever ? "예" : "아니오"}</td>
                <td>${statusText}</td>
                <td>${new Date(r.timestamp).toLocaleString()}</td>
            </tr>
        `;
    });

    tableHtml += `</tbody></table>`;

    // 엑셀에서 인식 가능한 MIME 타입으로 Blob 생성
    const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    // .xls 확장자를 붙이면 엑셀이 인코딩을 자동으로 완벽하게 감지합니다.
    link.setAttribute("href", url);
    link.setAttribute("download", `보건실_접수명단_${new Date().toLocaleDateString()}.xls`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

                if (clockText) {
                    clockText.innerText = new Date().toLocaleTimeString('ko-KR', { hour12: false });
                }
            }, 1000);

            setupFirebase();
        };
